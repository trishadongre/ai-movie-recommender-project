<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="container py-5">
    <h2 class="neon-text mb-4">MY <span class="text-white">WATCHLIST</span></h2>
    <div id="watchGrid" class="row"></div>
    <script>
        const list = JSON.parse(localStorage.getItem('myWatchlist') || '[]');
        const grid = document.getElementById('watchGrid');
        grid.innerHTML = list.length ? list.map(m => `
            <div class="col-6 col-md-3 mb-4">
                <div class="movie-card p-2 text-center">
                    <img src="${m.p}" class="img-fluid rounded mb-2">
                    <h6 class="text-truncate">${m.t}</h6>
                </div>
            </div>`).join('') : '<h4 class="text-secondary">Matrix Empty</h4>';
    </script>
</body>
</html>
