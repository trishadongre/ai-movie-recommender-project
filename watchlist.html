<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="neon-text fw-bold">MY <span class="text-white">WATCHLIST</span></h1>
        <button onclick="window.location.href='dashboard.html'" class="btn btn-outline-light">← BACK</button>
    </div>

    <div id="watchlistGrid" class="row"></div>

    <script>
        const list = JSON.parse(localStorage.getItem('myWatchlist') || '[]');
        const grid = document.getElementById('watchlistGrid');
        
        if(list.length === 0) {
            grid.innerHTML = '<div class="col-12 text-center p-5"><p class="text-secondary">Your watchlist is empty.</p></div>';
        } else {
            grid.innerHTML = list.map(m => `
                <div class="col-6 col-md-3 mb-4">
                    <div class="movie-card glass-panel p-2">
                        <img src="${m.poster}" class="img-fluid rounded mb-2">
                        <h6 class="text-truncate px-1">${m.title}</h6>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
