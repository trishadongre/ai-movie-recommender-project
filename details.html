<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatrix | Movie Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="container py-5">
    
    <!-- Navigation -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <button onclick="window.location.href='dashboard.html'" class="btn btn-outline-light px-4 rounded-pill">
            ← BACK TO DASHBOARD
        </button>
        <button onclick="window.location.href='watchlist.html'" class="btn btn-neon px-4 rounded-pill">
            MY WATCHLIST
        </button>
    </div>

    <!-- Details Container -->
    <div class="glass-panel p-4 p-md-5 mt-2">
        <div id="detailsContent" class="row">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-info" role="status"></div>
                <p class="neon-text mt-3">Retrieving Data from Matrix...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        async function loadMovieDetails() {
            const title = localStorage.getItem('selectedMovie');
            const movieId = localStorage.getItem('selectedId');
            const container = document.getElementById('detailsContent');

            if (!title) {
                container.innerHTML = `<div class="col-12 text-center text-danger">No movie selected. Redirecting...</div>`;
                setTimeout(() => window.location.href = 'dashboard.html', 2000);
                return;
            }

            try {
                // 1. Fetch IMDb link from links.csv
                const lRes = await fetch('links.csv');
                const lText = await lRes.text();
                const movieLinkRow = lText.split('\n').find(row => row.startsWith(movieId + ','));
                const imdbId = movieLinkRow ? movieLinkRow.split(',')[1] : '';

                // 2. Fetch Deep Info from OMDb (Plot, Ratings, Runtime)
                // We trim the title to remove years in parentheses like "(1995)"
                const cleanTitle = title.split(' (')[0].trim();
                const res = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(cleanTitle)}&plot=full&apikey=${API_KEY}`);
                const m = await res.json();

                if (m.Response === "True") {
                    container.innerHTML = `
                        <div class="col-md-5 mb-4 mb-md-0 text-center">
                            <img src="${m.Poster !== 'N/A' ? m.Poster : 'https://via.placeholder.com/400x600'}" 
                                 class="img-fluid rounded shadow-lg border-info border" alt="Poster">
                        </div>
                        <div class="col-md-7">
                            <h1 class="neon-text display-4 fw-bold">${m.Title}</h1>
                            <p class="text-secondary mb-3">${m.Year} • ${m.Genre} • ${m.Runtime}</p>
                            
                            <div class="d-flex gap-3 mb-4">
                                <span class="badge bg-warning text-dark p-2">⭐ IMDb ${m.imdbRating}</span>
                                <span class="badge border border-info text-info p-2">${m.Rated}</span>
                            </div>

                            <h5 class="neon-text">PLOT SUMMARY</h5>
                            <p class="lead text-light mb-4" style="line-height: 1.8;">${m.Plot}</p>
                            
                            <div class="d-flex gap-3 flex-wrap">
                                <button class="btn btn-neon px-4 py-2 fw-bold" 
                                        onclick="addToWatchlist('${m.Title.replace(/'/g, "\\'")}', '${m.Poster}')">
                                    + ADD TO WATCHLIST
                                </button>
                                ${imdbId ? `
                                    <a href="https://www.imdb.com/title/tt${imdbId}" target="_blank" class="btn btn-outline-info px-4 py-2">
                                        VIEW ON IMDB
                                    </a>` : ''}
                            </div>
                            
                            <div class="mt-5 pt-3 border-top border-secondary">
                                <p class="small text-secondary"><strong>Director:</strong> ${m.Director}</p>
                                <p class="small text-secondary"><strong>Cast:</strong> ${m.Actors}</p>
                            </div>
                        </div>
                    `;
                } else {
                    container.innerHTML = `<div class="col-12 text-center p-5"><h3>Matrix Error: Movie not found.</h3></div>`;
                }
            } catch (error) {
                container.innerHTML = `<div class="col-12 text-center p-5"><h3>System Error: Connection to Matrix failed.</h3></div>`;
            }
        }

        // Initialize page
        window.onload = loadMovieDetails;
    </script>
</body>
</html>
