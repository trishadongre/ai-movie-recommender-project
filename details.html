<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-5">
        <button onclick="window.history.back()" class="btn btn-outline-light mb-4">← BACK</button>
        <div id="detailsContent" class="glass-panel p-4">
            <div class="text-center neon-text">Accessing Files...</div>
        </div>
    </div>
    <script>
        const title = localStorage.getItem('selectedMovie');
        const API_KEY = 'YOUR_OMDB_KEY'; 

        async function loadDetails() {
            const res = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&plot=full&apikey=${API_KEY}`);
            const m = await res.json();
            document.getElementById('detailsContent').innerHTML = `
                <div class="row">
                    <div class="col-md-4 text-center"><img src="${m.Poster}" class="img-fluid rounded border-info border"></div>
                    <div class="col-md-8">
                        <h1 class="neon-text fw-bold">${m.Title}</h1>
                        <p class="text-secondary">${m.Year} • ${m.Genre}</p>
                        <p>${m.Plot}</p>
                        <button class="btn btn-neon" onclick="addToWatchlist('${m.Title}', '${m.Poster}')">ADD TO WATCHLIST</button>
                    </div>
                </div>`;
        }
        function addToWatchlist(t, p) {
            let list = JSON.parse(localStorage.getItem('myWatchlist') || '[]');
            if(!list.find(x => x.t === t)) list.push({t, p});
            localStorage.setItem('myWatchlist', JSON.stringify(list));
            alert('Added to Matrix!');
        }
        loadDetails();
    </script>
</body>
</html>
