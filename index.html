<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="loginOverlay" class="vh-100 d-flex align-items-center justify-content-center bg-dark">
        <div class="login-box glass-panel p-5 text-center">
            <h1 class="fw-bold mb-4">CINE<span class="neon-text">MATRIX</span></h1>
            <input type="text" id="usernameInput" class="form-control mb-3" placeholder="trisha">
            <button class="btn btn-neon w-100 py-3 fw-bold" onclick="login()">ENTER SYSTEM</button>
        </div>
    </div>

    <!-- Dashboard (Visible after login) -->
    <div class="container py-4">
        <header class="d-flex justify-content-between align-items-center glass-panel p-3 mb-4">
            <h2 class="neon-text fw-bold m-0">CINEMATRIX</h2>
            <div class="d-flex gap-2">
                <input type="text" class="form-control bg-dark border-secondary text-white" placeholder="Search...">
                <button class="btn btn-info btn-sm">WATCHLIST (0)</button>
                <button class="btn btn-outline-danger btn-sm">LOGOUT</button>
            </div>
        </header>

        <div class="genre-bar d-flex justify-content-center gap-2 mb-5">
            <button onclick="renderDashboard('Action')" class="genre-pill">Action</button>
            <button onclick="renderDashboard('Comedy')" class="genre-pill">Comedy</button>
            <button onclick="renderDashboard('Horror')" class="genre-pill active">Horror</button>
            <button onclick="renderDashboard('Sci-Fi')" class="genre-pill">Sci-Fi</button>
        </div>

        <div class="text-center mb-5">
            <h1 id="recommendationTitle" class="fw-bold display-4">Recommended <span class="neon-text">Horror</span></h1>
            <p class="text-secondary">Analysis based on User-Item Matrix collaborative patterns.</p>
        </div>

        <div id="movieGrid" class="row"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
