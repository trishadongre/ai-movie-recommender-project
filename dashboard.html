<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatrix | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="container py-4">

    <header class="glass-panel d-flex justify-content-between align-items-center p-3 mb-4 flex-wrap gap-3">
        <h2 class="neon-text fw-bold m-0">CINEMATRIX</h2>
        
        <div class="d-flex gap-2">
            <!-- WATCHLIST BUTTON WITH LIVE COUNT -->
            <button class="btn btn-outline-info rounded-pill px-4" onclick="window.location.href='watchlist.html'">
                WATCHLIST (<span id="watchCount">0</span>)
            </button>
            <button class="btn btn-outline-danger rounded-pill" onclick="window.location.href='index.html'">LOGOUT</button>
        </div>
    </header>

    <!-- Genre Selection Bar -->
    <div class="genre-bar d-flex justify-content-center gap-2 mb-5 flex-wrap">
        <button onclick="renderDashboard('Action')" class="genre-pill">Action</button>
        <button onclick="renderDashboard('Comedy')" class="genre-pill">Comedy</button>
        <button onclick="renderDashboard('Drama')" class="genre-pill">Drama</button>
        <button onclick="renderDashboard('Sci-Fi')" class="genre-pill">Sci-Fi</button>
        <button onclick="renderDashboard('Horror')" class="genre-pill">Horror</button>
        <button onclick="renderDashboard('Romance')" class="genre-pill">Romance</button>
        <button onclick="renderDashboard('Animation')" class="genre-pill">Animation</button>
    </div>

    <div class="text-center mb-5">
        <h1 id="recommendationTitle" class="fw-bold display-4">Recommended <span class="neon-text">Movies</span></h1>
        <p class="text-secondary small">Analysis based on User-Item Matrix collaborative patterns.</p>
    </div>

    <!-- Movie Display Grid -->
    <div id="movieGrid" class="row"></div>

    <script src="script.js"></script>
</body>
</html>
