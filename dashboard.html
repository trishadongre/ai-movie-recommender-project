<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="container py-4">
    <header class="d-flex justify-content-between align-items-center glass-panel p-3 mb-4">
        <h2 class="neon-text fw-bold m-0">CINEMATRIX</h2>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-danger btn-sm rounded-pill" onclick="window.location.href='index.html'">LOGOUT</button>
        </div>
    </header>

    <div class="genre-bar d-flex justify-content-center gap-2 mb-5">
        <button onclick="renderDashboard('Action')" class="genre-pill">Action</button>
        <button onclick="renderDashboard('Comedy')" class="genre-pill">Comedy</button>
        <button onclick="renderDashboard('Horror')" class="genre-pill">Horror</button>
    </div>

    <div id="movieGrid" class="row"></div>

    <script src="script.js"></script>
    <script>
        // Only load data once we are safely on the dashboard
        window.onload = () => renderDashboard('Horror');
    </script>
</body>
</html>
